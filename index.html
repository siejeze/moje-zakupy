<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <title>Moje Zakupy</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --green: #16a34a;
      --green-dark: #15803d;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 16px;
      --nav-h: 68px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1216; --card: #1a1f26; --text: #f3f4f6; --muted: #9aa3af;
        --border: #2a3038; --shadow: 0 1px 3px rgba(0,0,0,.4);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky; top: 0; z-index: 30;
      background: var(--green); color: #fff;
      padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    header h1 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: .2px; }
    header .sub { font-size: 13px; opacity: .9; margin-top: 2px; }
    .search-wrap { padding: 12px 16px 4px; position: sticky; top: 0; z-index: 20; background: var(--bg); }
    .search { display: flex; align-items: center; gap: 8px; background: var(--card);
      border: 1px solid var(--border); border-radius: 999px; padding: 10px 16px; box-shadow: var(--shadow); }
    .search input { border: none; outline: none; background: transparent; color: var(--text);
      font-size: 16px; width: 100%; }
    .search svg { flex: 0 0 auto; color: var(--muted); }
    main { padding: 8px 12px 20px; max-width: 640px; margin: 0 auto; }

    .cat-title { font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted); margin: 18px 6px 8px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row .name { flex: 1; font-size: 16px; line-height: 1.3; }
    .row .unit { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .row.active { background: color-mix(in srgb, var(--green) 8%, var(--card)); }

    .stepper { display: flex; align-items: center; gap: 0; flex: 0 0 auto; }
    .stepper button { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 22px; font-weight: 600; line-height: 1;
      display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
    .stepper button:active { transform: scale(.92); }
    .stepper .qty { min-width: 34px; text-align: center; font-size: 17px; font-weight: 700; }
    .stepper .add { background: var(--green); color: #fff; border-color: var(--green); }

    .fav-star { background: none; border: none; padding: 4px; cursor: pointer; color: var(--muted); }
    .fav-star.on { color: #f59e0b; }
    .del-btn { background: none; border: none; padding: 6px; cursor: pointer; color: #ef4444; }

    /* Lista zakupów */
    .list-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; }
    .check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--muted);
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .list-item.done .check { background: var(--green); border-color: var(--green); }
    .list-item.done .name { text-decoration: line-through; color: var(--muted); }
    .list-item .name { flex: 1; font-size: 17px; }
    .list-item .qtybadge { font-weight: 700; font-size: 15px; color: var(--green-dark);
      background: color-mix(in srgb, var(--green) 14%, transparent); padding: 3px 10px; border-radius: 999px; }

    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
    .empty .big { font-size: 46px; margin-bottom: 12px; }

    .bar { display: flex; gap: 10px; padding: 4px 6px 14px; }
    .btn { flex: 1; min-width: 0; border: none; border-radius: 14px; padding: 14px 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      white-space: nowrap; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--card); color: #ef4444; border: 1px solid var(--border); }

    .progress { height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; margin: 2px 6px 14px; }
    .progress > span { display: block; height: 100%; background: var(--green); transition: width .25s; }

    /* Dolna nawigacja */
    nav.tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 40;
    }
    nav.tabbar button { flex: 1; background: none; border: none; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      font-size: 11px; cursor: pointer; padding-top: 8px; }
    nav.tabbar button.active { color: var(--green); }
    nav.tabbar .badge { position: absolute; top: 6px; margin-left: 22px; background: #ef4444; color: #fff;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
      display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--card); width: 100%; max-width: 640px; border-radius: 20px 20px 0 0;
      padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); animation: up .2s ease; }
    @keyframes up { from { transform: translateY(30px); opacity: .6; } to { transform: none; opacity: 1; } }
    .modal h2 { margin: 0 0 16px; font-size: 19px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .field input, .field select { width: 100%; padding: 13px 14px; font-size: 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .toast { position: fixed; bottom: calc(var(--nav-h) + 18px); left: 50%; transform: translateX(-50%);
      background: #1a1d21; color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 14px;
      z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.3); opacity: 0; transition: opacity .2s; }
    .toast.show { opacity: 1; }
    .hint { font-size: 13px; color: var(--muted); padding: 4px 8px 12px; }
  </style>
</head>
<body>
  <header>
    <h1>🛒 Moje Zakupy</h1>
    <div class="sub" id="sub">Zaznacz, co chcesz kupić</div>
  </header>

  <div id="view"></div>

  <nav class="tabbar">
    <button id="tab-katalog" onclick="setTab('katalog')">
      <span style="font-size:22px">📋</span><span>Produkty</span>
    </button>
    <button id="tab-lista" onclick="setTab('lista')" style="position:relative">
      <span style="font-size:22px">🛍️</span><span>Lista</span>
      <span class="badge" id="list-badge" style="display:none">0</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
  "use strict";
  const STORE_KEY = "moje-zakupy-v1";
  let state = { products: [], tab: "katalog", search: "", editMode: false };

  // ---------- Trwałość danych ----------
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) { state.products = JSON.parse(raw); return; }
    } catch (e) {}
    seedFromCatalog();
  }
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state.products)); }
  function seedFromCatalog() {
    let id = 1;
    state.products = [];
    for (const group of window.DEFAULT_CATALOG) {
      for (const name of group.items) {
        state.products.push({ id: id++, name, cat: group.cat, qty: 0, fav: false });
      }
    }
    save();
  }

  // ---------- Pomocnicze ----------
  const $ = (s) => document.querySelector(s);
  function toast(msg) {
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 1600);
  }
  function catsInOrder() {
    const seen = []; for (const p of state.products) if (!seen.includes(p.cat)) seen.push(p.cat); return seen;
  }
  function selectedCount() { return state.products.filter(p => p.qty > 0).length; }

  // ---------- Akcje ----------
  function setQty(id, delta) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.qty = Math.max(0, (p.qty || 0) + delta); save(); render();
  }
  function toggleFav(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.fav = !p.fav; save(); render();
  }
  function delProduct(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    if (!confirm(`Usunąć „${p.name}" z bazy? Nie będzie się już pojawiać.`)) return;
    state.products = state.products.filter(x => x.id !== id); save(); render(); toast("Usunięto produkt");
  }
  function addProduct(name, cat, unit) {
    name = name.trim(); if (!name) return;
    const id = Math.max(0, ...state.products.map(p => p.id)) + 1;
    state.products.push({ id, name, cat: cat || "Inne", unit: unit || "", qty: 0, fav: false });
    save();
  }
  function toggleDone(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.done = !p.done; save(); render();
  }
  function clearList() {
    if (!confirm("Wyczyścić całą listę zakupów? Ilości wrócą do zera.")) return;
    for (const p of state.products) { p.qty = 0; p.done = false; }
    save(); render(); toast("Lista wyczyszczona");
  }
  function shareList() {
    const lines = state.products.filter(p => p.qty > 0)
      .map(p => `• ${p.name} — ${p.qty}${p.unit ? " " + p.unit : ""}`);
    if (!lines.length) { toast("Lista jest pusta"); return; }
    const text = "🛒 Lista zakupów\n" + lines.join("\n");
    if (navigator.share) { navigator.share({ text }).catch(() => {}); }
    else { navigator.clipboard.writeText(text).then(() => toast("Skopiowano listę")); }
  }

  // ---------- Widoki ----------
  function setTab(tab) { state.tab = tab; render(); window.scrollTo(0, 0); }

  function render() {
    // dolna nawigacja
    $("#tab-katalog").classList.toggle("active", state.tab === "katalog");
    $("#tab-lista").classList.toggle("active", state.tab === "lista");
    const n = selectedCount(), badge = $("#list-badge");
    badge.style.display = n ? "flex" : "none"; badge.textContent = n;

    if (state.tab === "katalog") renderKatalog(); else renderLista();
  }

  function svgSearch() {
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  }

  function renderKatalog() {
    const q = state.search.trim().toLowerCase();
    const cats = catsInOrder();
    let html = `
      <div class="search-wrap">
        <div class="search">${svgSearch()}
          <input id="searchbox" placeholder="Szukaj produktu…" value="${escapeAttr(state.search)}" />
        </div>
      </div>
      <main>
        <div class="bar">
          <button class="btn btn-primary" onclick="openAddModal()">＋ Dodaj produkt</button>
          <button class="btn btn-ghost" onclick="toggleEdit()">${state.editMode ? "✓ Gotowe" : "✎ Edytuj bazę"}</button>
        </div>`;

    let any = false;
    for (const cat of cats) {
      let items = state.products.filter(p => p.cat === cat);
      if (q) items = items.filter(p => p.name.toLowerCase().includes(q));
      // ulubione na górze w obrębie kategorii
      items.sort((a, b) => (b.fav - a.fav) || a.name.localeCompare(b.name, "pl"));
      if (!items.length) continue;
      any = true;
      html += `<div class="cat-title">${escapeHtml(cat)}</div><div class="card">`;
      for (const p of items) html += rowKatalog(p);
      html += `</div>`;
    }
    if (!any) html += `<div class="empty"><div class="big">🔍</div>Brak produktów pasujących do „${escapeHtml(state.search)}"</div>`;
    html += `</main>`;
    $("#view").innerHTML = html;
    $("#sub").textContent = "Zaznacz, co chcesz kupić";

    const box = $("#searchbox");
    box.addEventListener("input", (e) => { state.search = e.target.value; state._focusSearch = true; renderKatalog(); });
    box.addEventListener("focus", () => { state._focusSearch = true; });
    box.addEventListener("blur", () => { state._focusSearch = false; });
    // utrzymaj fokus/kursor tylko gdy użytkowniczka faktycznie pisze w wyszukiwarce
    if (state._focusSearch) { box.focus(); const v = box.value; box.value = ""; box.value = v; }
  }

  function rowKatalog(p) {
    const active = p.qty > 0;
    const right = state.editMode
      ? `<button class="del-btn" onclick="delProduct(${p.id})" aria-label="Usuń">
           <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
         </button>`
      : `<div class="stepper">
           ${active ? `<button onclick="setQty(${p.id},-1)">−</button><span class="qty">${p.qty}</span>` : ""}
           <button class="add" onclick="setQty(${p.id},1)">＋</button>
         </div>`;
    return `
      <div class="row ${active ? "active" : ""}">
        <button class="fav-star ${p.fav ? "on" : ""}" onclick="toggleFav(${p.id})" aria-label="Ulubione">
          ${p.fav ? "★" : "☆"}
        </button>
        <div class="name">${escapeHtml(p.name)}${p.unit ? `<div class="unit">${escapeHtml(p.unit)}</div>` : ""}</div>
        ${right}
      </div>`;
  }

  function renderLista() {
    const items = state.products.filter(p => p.qty > 0);
    if (!items.length) {
      $("#view").innerHTML = `<main><div class="empty">
        <div class="big">🛍️</div>
        <div style="font-size:18px;font-weight:600;color:var(--text)">Lista jest pusta</div>
        <div style="margin-top:8px">Przejdź do „Produkty" i dodaj to, co chcesz kupić.</div>
      </div></main>`;
      $("#sub").textContent = "Twoja lista zakupów";
      return;
    }
    const done = items.filter(p => p.done).length;
    const pct = Math.round((done / items.length) * 100);
    const cats = catsInOrder().filter(c => items.some(p => p.cat === c));

    let html = `<main>
      <div class="progress"><span style="width:${pct}%"></span></div>
      <div class="hint">Kupione ${done} z ${items.length} • dotknij kwadrat, gdy wrzucisz do koszyka</div>`;

    for (const cat of cats) {
      const its = items.filter(p => p.cat === cat).sort((a, b) => a.name.localeCompare(b.name, "pl"));
      html += `<div class="cat-title">${escapeHtml(cat)}</div><div class="card">`;
      for (const p of its) {
        html += `<div class="list-item ${p.done ? "done" : ""}">
          <div class="check" onclick="toggleDone(${p.id})">${p.done ? "✓" : ""}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="qtybadge">${p.qty}${p.unit ? " " + escapeHtml(p.unit) : ""}</div>
          <div class="stepper"><button onclick="setQty(${p.id},-1)">−</button><button class="add" onclick="setQty(${p.id},1)">＋</button></div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `<div class="bar" style="margin-top:16px">
        <button class="btn btn-primary" onclick="shareList()">↗ Udostępnij</button>
        <button class="btn btn-danger" onclick="clearList()">🗑 Wyczyść</button>
      </div></main>`;
    $("#view").innerHTML = html;
    $("#sub").textContent = "Twoja lista zakupów";
  }

  function toggleEdit() { state.editMode = !state.editMode; render(); }

  // ---------- Modal dodawania ----------
  function openAddModal() {
    const cats = [...new Set([...catsInOrder(), "Inne"])];
    const opts = cats.map(c => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`).join("");
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <h2>Dodaj produkt</h2>
      <div class="field"><label>Nazwa</label><input id="m-name" placeholder="np. Ser koryciński" autofocus /></div>
      <div class="field"><label>Kategoria</label><select id="m-cat">${opts}</select></div>
      <div class="field"><label>Jednostka (opcjonalnie)</label><input id="m-unit" placeholder="np. opak, kg, szt" /></div>
      <div class="bar" style="padding:6px 0 0">
        <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
        <button class="btn btn-primary" onclick="submitAdd()">Dodaj</button>
      </div>
    </div>`;
    bg.addEventListener("click", closeModal);
    document.body.appendChild(bg);
    state._modal = bg;
    setTimeout(() => $("#m-name").focus(), 50);
  }
  function closeModal() { if (state._modal) { state._modal.remove(); state._modal = null; } }
  function submitAdd() {
    const name = $("#m-name").value, cat = $("#m-cat").value, unit = $("#m-unit").value;
    if (!name.trim()) { $("#m-name").focus(); return; }
    addProduct(name, cat, unit);
    closeModal(); render(); toast("Dodano do bazy");
  }

  // ---------- Escapowanie ----------
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  // ---------- Start ----------
  load(); render();
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
  </script>
</body>
</html>
