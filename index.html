<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <title>Moje Zakupy</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --green: #16a34a;
      --green-dark: #15803d;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 16px;
      --nav-h: 68px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1216; --card: #1a1f26; --text: #f3f4f6; --muted: #9aa3af;
        --border: #2a3038; --shadow: 0 1px 3px rgba(0,0,0,.4);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky; top: 0; z-index: 30;
      background: var(--green); color: #fff;
      padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    header h1 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: .2px; }
    header .sub { font-size: 13px; opacity: .9; margin-top: 2px; }
    .search-wrap { padding: 12px 16px 4px; position: sticky; top: 0; z-index: 20; background: var(--bg); }
    .search { display: flex; align-items: center; gap: 8px; background: var(--card);
      border: 1px solid var(--border); border-radius: 999px; padding: 10px 16px; box-shadow: var(--shadow); }
    .search input { border: none; outline: none; background: transparent; color: var(--text);
      font-size: 16px; width: 100%; }
    .search svg { flex: 0 0 auto; color: var(--muted); }
    main { padding: 8px 12px 20px; max-width: 640px; margin: 0 auto; }

    .cat-title { font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted); margin: 18px 6px 8px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row .name { flex: 1; font-size: 19px; line-height: 1.3; }
    .row .unit { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .row.active { background: color-mix(in srgb, var(--green) 8%, var(--card)); }

    .stepper { display: flex; align-items: center; gap: 0; flex: 0 0 auto; }
    .stepper button { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 22px; font-weight: 600; line-height: 1;
      display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
    .stepper button:active { transform: scale(.92); }
    .stepper .qty { min-width: 34px; text-align: center; font-size: 17px; font-weight: 700; }
    .stepper .add { background: var(--green); color: #fff; border-color: var(--green); }

    .fav-star { background: none; border: none; padding: 4px; cursor: pointer; color: var(--muted); }
    .fav-star.on { color: #f59e0b; }
    .del-btn { background: none; border: none; padding: 6px; cursor: pointer; color: #ef4444; }

    /* Lista zakupów */
    .list-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; }
    .check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--muted);
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .list-item.done .check { background: var(--green); border-color: var(--green); }
    .list-item.done .name { text-decoration: line-through; color: var(--muted); }
    .list-item .name { flex: 1; font-size: 19px; }
    .list-item .qtybadge { font-weight: 700; font-size: 15px; color: var(--green-dark);
      background: color-mix(in srgb, var(--green) 14%, transparent); padding: 3px 10px; border-radius: 999px; }

    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
    .empty .big { font-size: 46px; margin-bottom: 12px; }

    .bar { display: flex; gap: 10px; padding: 4px 6px 14px; }
    .btn { flex: 1; min-width: 0; border: none; border-radius: 14px; padding: 14px 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      white-space: nowrap; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--card); color: #ef4444; border: 1px solid var(--border); }

    .progress { height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; margin: 2px 6px 14px; }
    .progress > span { display: block; height: 100%; background: var(--green); transition: width .25s; }

    /* Dolna nawigacja */
    nav.tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 40;
    }
    nav.tabbar button { flex: 1; background: none; border: none; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      font-size: 11px; cursor: pointer; padding-top: 8px; }
    nav.tabbar button.active { color: var(--green); }
    nav.tabbar .badge { position: absolute; top: 6px; margin-left: 22px; background: #ef4444; color: #fff;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
      display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--card); width: 100%; max-width: 640px; border-radius: 20px 20px 0 0;
      padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); animation: up .2s ease; }
    @keyframes up { from { transform: translateY(30px); opacity: .6; } to { transform: none; opacity: 1; } }
    .modal h2 { margin: 0 0 16px; font-size: 19px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .field input, .field select { width: 100%; padding: 13px 14px; font-size: 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .toast { position: fixed; bottom: calc(var(--nav-h) + 18px); left: 50%; transform: translateX(-50%);
      background: #1a1d21; color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 14px;
      z-index: 60; box-shadow: 0 4px 14px rgba(0,0,0,.3); opacity: 0; transition: opacity .2s; }
    .toast.show { opacity: 1; }
    .hint { font-size: 13px; color: var(--muted); padding: 4px 8px 12px; }
  </style>
</head>
<body>
  <header>
    <h1>🛒 Moje Zakupy</h1>
    <div class="sub" id="sub">Zaznacz, co chcesz kupić</div>
  </header>

  <div id="view"></div>

  <nav class="tabbar">
    <button id="tab-katalog" onclick="setTab('katalog')">
      <span style="font-size:22px">📋</span><span>Produkty</span>
    </button>
    <button id="tab-lista" onclick="setTab('lista')" style="position:relative">
      <span style="font-size:22px">🛍️</span><span>Lista</span>
      <span class="badge" id="list-badge" style="display:none">0</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
  "use strict";
  const STORE_KEY = "moje-zakupy-v1";
  // Podbij ten numer za KAŻDYM razem, gdy zmienia się lista produktów w data.js —
  // dzięki temu już zainstalowana apka dociągnie nowe produkty przy aktualizacji.
  const CATALOG_VERSION = 3;
  let state = { products: [], deleted: [], tab: "katalog", search: "", editMode: false };

  // ---------- Trwałość danych ----------
  function load() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
    if (Array.isArray(data)) data = { products: data, catV: 0, deleted: [] }; // migracja starego formatu
    if (!data || !Array.isArray(data.products) || !data.products.length) { seedFromCatalog(); return; }
    state.products = data.products;
    state.deleted = data.deleted || [];
    if ((data.catV || 0) < CATALOG_VERSION) mergeNewDefaults(); // dociągnij nowe produkty z data.js
    save();
  }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(
      { products: state.products, deleted: state.deleted, catV: CATALOG_VERSION }));
  }
  function nextId() { return Math.max(0, ...state.products.map(p => p.id)) + 1; }
  function seedFromCatalog() {
    state.products = []; state.deleted = [];
    let id = 1;
    for (const group of window.DEFAULT_CATALOG)
      for (const name of group.items)
        state.products.push({ id: id++, name, cat: group.cat, qty: 0, fav: false });
    save();
  }
  // Dokłada do istniejącej bazy NOWE produkty z data.js — bez ruszania tego, co masz,
  // i bez wskrzeszania pozycji, które sama usunęłaś.
  function mergeNewDefaults() {
    const have = new Set(state.products.map(p => p.name));
    const gone = new Set(state.deleted);
    let id = nextId();
    for (const group of window.DEFAULT_CATALOG)
      for (const name of group.items)
        if (!have.has(name) && !gone.has(name))
          state.products.push({ id: id++, name, cat: group.cat, qty: 0, fav: false });
  }

  // ---------- Pomocnicze ----------
  const $ = (s) => document.querySelector(s);
  function toast(msg) {
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove("show"), 1600);
  }
  function catsInOrder() {
    const seen = []; for (const p of state.products) if (!seen.includes(p.cat)) seen.push(p.cat); return seen;
  }
  function selectedCount() { return state.products.filter(p => p.qty > 0).length; }

  // ---------- Akcje ----------
  function setQty(id, delta) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.qty = Math.max(0, (p.qty || 0) + delta); save(); refresh();
  }
  function toggleFav(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.fav = !p.fav; save(); refresh();
  }
  function delProduct(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    if (!confirm(`Usunąć „${p.name}" z bazy? Nie będzie się już pojawiać.`)) return;
    if (!state.deleted.includes(p.name)) state.deleted.push(p.name); // nie wróci przy aktualizacji
    state.products = state.products.filter(x => x.id !== id); save(); refresh(); toast("Usunięto produkt");
  }
  function addProduct(name, cat, unit) {
    name = name.trim(); if (!name) return;
    state.deleted = state.deleted.filter(n => n !== name); // gdyby była wcześniej usunięta
    state.products.push({ id: nextId(), name, cat: cat || "Inne", unit: unit || "", qty: 0, fav: false });
    save();
  }
  function toggleDone(id) {
    const p = state.products.find(x => x.id === id); if (!p) return;
    p.done = !p.done; save(); refresh();
  }
  function clearList() {
    if (!confirm("Wyczyścić całą listę zakupów? Ilości wrócą do zera.")) return;
    for (const p of state.products) { p.qty = 0; p.done = false; }
    save(); render(); toast("Lista wyczyszczona");
  }
  // Udostępnia listę jako LINK — druga osoba otwiera go i może odhaczać produkty
  // u siebie w sklepie. Cała lista jest zakodowana w adresie (bez żadnego serwera).
  function shareList() {
    const items = state.products.filter(p => p.qty > 0);
    if (!items.length) { toast("Lista jest pusta"); return; }
    const payload = { t: "Lista zakupów", i: items.map(p => [p.name, p.qty, p.unit || "", p.cat]) };
    const url = location.origin + location.pathname + "#l=" + b64urlFromUtf8(JSON.stringify(payload));
    const text = "🛒 Wysyłam Ci listę zakupów — otwórz link i możesz odhaczać produkty w sklepie:";
    if (navigator.share) { navigator.share({ title: "Lista zakupów", text, url }).catch(() => {}); }
    else { navigator.clipboard.writeText(text + "\n" + url).then(() => toast("Skopiowano link — wklej go w wiadomości")); }
  }
  // Bezpieczne (UTF-8) kodowanie/dekodowanie do adresu URL.
  function b64urlFromUtf8(str) {
    return btoa(unescape(encodeURIComponent(str))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function utf8FromB64url(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/"); while (s.length % 4) s += "=";
    return decodeURIComponent(escape(atob(s)));
  }
  function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0; return (h >>> 0).toString(36); }

  // ---------- Widoki ----------
  function setTab(tab) { state.tab = tab; render(); window.scrollTo(0, 0); }

  function updateNav() {
    $("#tab-katalog").classList.toggle("active", state.tab === "katalog");
    $("#tab-lista").classList.toggle("active", state.tab === "lista");
    const n = selectedCount(), badge = $("#list-badge");
    badge.style.display = n ? "flex" : "none"; badge.textContent = n;
  }
  // Pełne przerysowanie widoku (zmiana zakładki, wejście/wyjście z edycji).
  function render() {
    updateNav();
    if (state.tab === "katalog") renderKatalog(); else renderLista();
  }
  // Lekkie odświeżenie po zmianie ilości/odhaczeniu — NIE rusza pola wyszukiwania
  // ani pozycji przewijania.
  function refresh() {
    updateNav();
    if (state.tab === "katalog") fillProductList();
    else { const y = window.scrollY; renderLista(); window.scrollTo(0, y); }
  }

  function svgSearch() {
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  }

  // Buduje SZKIELET katalogu (wyszukiwarka + pasek przycisków + pusty kontener listy)
  // raz. Pole wyszukiwania nie jest już przerysowywane przy pisaniu — dlatego kursor
  // i fokus zostają na miejscu i można pisać płynnie.
  function renderKatalog() {
    $("#view").innerHTML = `
      <div class="search-wrap">
        <div class="search">${svgSearch()}
          <input id="searchbox" placeholder="Szukaj produktu…" value="${escapeAttr(state.search)}" />
        </div>
      </div>
      <main>
        <div class="bar">
          <button class="btn btn-primary" onclick="openAddModal()">＋ Dodaj produkt</button>
          <button class="btn btn-ghost" onclick="toggleEdit()">${state.editMode ? "✓ Gotowe" : "✎ Edytuj bazę"}</button>
        </div>
        ${state.editMode ? `<div class="bar" style="padding-top:0">
          <button class="btn btn-ghost" onclick="openBackupModal()">📤 Zrób kopię</button>
          <button class="btn btn-ghost" onclick="openRestoreModal()">📥 Wczytaj kopię</button>
        </div>` : ""}
        <div id="product-list"></div>
      </main>`;
    $("#sub").textContent = "Zaznacz, co chcesz kupić";
    const box = $("#searchbox");
    box.addEventListener("input", () => { state.search = box.value; fillProductList(); });
    fillProductList();
  }

  // Przerysowuje TYLKO listę produktów (nie dotyka pola wyszukiwania).
  function fillProductList() {
    const list = $("#product-list");
    if (!list) return renderKatalog();
    const q = state.search.trim().toLowerCase();
    let html = "", any = false;
    for (const cat of catsInOrder()) {
      let items = state.products.filter(p => p.cat === cat);
      if (q) items = items.filter(p => p.name.toLowerCase().includes(q));
      items.sort((a, b) => (b.fav - a.fav) || a.name.localeCompare(b.name, "pl")); // ulubione na górze
      if (!items.length) continue;
      any = true;
      html += `<div class="cat-title">${escapeHtml(cat)}</div><div class="card">`;
      for (const p of items) html += rowKatalog(p);
      html += `</div>`;
    }
    if (!any) html += `<div class="empty"><div class="big">🔍</div>Brak produktów pasujących do „${escapeHtml(state.search)}"</div>`;
    list.innerHTML = html;
  }

  function rowKatalog(p) {
    const active = p.qty > 0;
    const right = state.editMode
      ? `<button class="del-btn" onclick="delProduct(${p.id})" aria-label="Usuń">
           <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
         </button>`
      : `<div class="stepper">
           ${active ? `<button onclick="setQty(${p.id},-1)">−</button><span class="qty">${p.qty}</span>` : ""}
           <button class="add" onclick="setQty(${p.id},1)">＋</button>
         </div>`;
    return `
      <div class="row ${active ? "active" : ""}">
        <button class="fav-star ${p.fav ? "on" : ""}" onclick="toggleFav(${p.id})" aria-label="Ulubione">
          ${p.fav ? "★" : "☆"}
        </button>
        <div class="name">${escapeHtml(p.name)}${p.unit ? `<div class="unit">${escapeHtml(p.unit)}</div>` : ""}</div>
        ${right}
      </div>`;
  }

  function renderLista() {
    const items = state.products.filter(p => p.qty > 0);
    if (!items.length) {
      $("#view").innerHTML = `<main><div class="empty">
        <div class="big">🛍️</div>
        <div style="font-size:18px;font-weight:600;color:var(--text)">Lista jest pusta</div>
        <div style="margin-top:8px">Przejdź do „Produkty" i dodaj to, co chcesz kupić.</div>
      </div></main>`;
      $("#sub").textContent = "Twoja lista zakupów";
      return;
    }
    const done = items.filter(p => p.done).length;
    const pct = Math.round((done / items.length) * 100);
    const cats = catsInOrder().filter(c => items.some(p => p.cat === c));

    let html = `<main>
      <div class="progress"><span style="width:${pct}%"></span></div>
      <div class="hint">Kupione ${done} z ${items.length} • dotknij kwadrat, gdy wrzucisz do koszyka</div>`;

    for (const cat of cats) {
      const its = items.filter(p => p.cat === cat).sort((a, b) => a.name.localeCompare(b.name, "pl"));
      html += `<div class="cat-title">${escapeHtml(cat)}</div><div class="card">`;
      for (const p of its) {
        html += `<div class="list-item ${p.done ? "done" : ""}">
          <div class="check" onclick="toggleDone(${p.id})">${p.done ? "✓" : ""}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="qtybadge">${p.qty}${p.unit ? " " + escapeHtml(p.unit) : ""}</div>
          <div class="stepper"><button onclick="setQty(${p.id},-1)">−</button><button class="add" onclick="setQty(${p.id},1)">＋</button></div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `<div class="bar" style="margin-top:16px">
        <button class="btn btn-primary" onclick="shareList()">↗ Udostępnij</button>
        <button class="btn btn-danger" onclick="clearList()">🗑 Wyczyść</button>
      </div></main>`;
    $("#view").innerHTML = html;
    $("#sub").textContent = "Twoja lista zakupów";
  }

  function toggleEdit() { state.editMode = !state.editMode; render(); }

  // ---------- Modal dodawania ----------
  function openAddModal() {
    const cats = [...new Set([...catsInOrder(), "Inne"])];
    const opts = cats.map(c => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`).join("");
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <h2>Dodaj produkt</h2>
      <div class="field"><label>Nazwa</label><input id="m-name" placeholder="np. Ser koryciński" autofocus /></div>
      <div class="field"><label>Kategoria</label><select id="m-cat">${opts}</select></div>
      <div class="field"><label>Jednostka (opcjonalnie)</label><input id="m-unit" placeholder="np. opak, kg, szt" /></div>
      <div class="bar" style="padding:6px 0 0">
        <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
        <button class="btn btn-primary" onclick="submitAdd()">Dodaj</button>
      </div>
    </div>`;
    bg.addEventListener("click", closeModal);
    document.body.appendChild(bg);
    state._modal = bg;
    setTimeout(() => $("#m-name").focus(), 50);
  }
  function closeModal() { if (state._modal) { state._modal.remove(); state._modal = null; } }
  function submitAdd() {
    const name = $("#m-name").value, cat = $("#m-cat").value, unit = $("#m-unit").value;
    if (!name.trim()) { $("#m-name").focus(); return; }
    addProduct(name, cat, unit);
    closeModal(); refresh(); toast("Dodano do bazy");
  }

  // ---------- Kopia zapasowa / przenoszenie bazy między urządzeniami ----------
  function openBackupModal() {
    const json = JSON.stringify({ v: CATALOG_VERSION, products: state.products, deleted: state.deleted });
    window._backupJson = json;
    const code = b64urlFromUtf8(json);
    const bg = document.createElement("div"); bg.className = "modal-bg";
    bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <h2>Kopia Twojej bazy</h2>
      <div class="hint" style="padding:0 0 10px">Skopiuj ten kod i prześlij go sobie (np. na WhatsApp albo e-mail),
        a na drugim telefonie wczytaj przez „Wczytaj kopię". Możesz też pobrać plik.</div>
      <textarea id="bk-code" readonly style="width:100%;height:110px;font-size:12px;border-radius:12px;
        border:1px solid var(--border);background:var(--bg);color:var(--text);padding:10px">${escapeHtml(code)}</textarea>
      <div class="bar" style="padding:10px 0 0">
        <button class="btn btn-ghost" onclick="downloadBackup()">💾 Pobierz plik</button>
        <button class="btn btn-primary" onclick="copyBackup()">📋 Kopiuj kod</button>
      </div>
      <div class="bar" style="padding:8px 0 0"><button class="btn btn-ghost" onclick="closeModal()">Zamknij</button></div>
    </div>`;
    bg.addEventListener("click", closeModal); document.body.appendChild(bg); state._modal = bg;
  }
  function copyBackup() {
    const t = $("#bk-code"); t.select();
    (navigator.clipboard ? navigator.clipboard.writeText(t.value) : Promise.reject())
      .then(() => toast("Skopiowano kod")).catch(() => toast("Zaznacz kod i skopiuj ręcznie"));
  }
  function downloadBackup() {
    const blob = new Blob([window._backupJson], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "moje-zakupy-kopia.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000); toast("Pobrano plik kopii");
  }
  function openRestoreModal() {
    const bg = document.createElement("div"); bg.className = "modal-bg";
    bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <h2>Wczytaj kopię</h2>
      <div class="hint" style="padding:0 0 10px">Wklej kod kopii albo wybierz plik.
        To zastąpi obecną bazę na tym urządzeniu.</div>
      <textarea id="rs-code" placeholder="Wklej tutaj kod kopii…" style="width:100%;height:110px;font-size:12px;
        border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);padding:10px"></textarea>
      <div class="field" style="margin-top:10px"><label>…albo plik kopii (.json)</label>
        <input type="file" id="rs-file" accept=".json,application/json" /></div>
      <div class="bar" style="padding:6px 0 0">
        <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
        <button class="btn btn-primary" onclick="doRestore()">Wczytaj</button>
      </div>
    </div>`;
    bg.addEventListener("click", closeModal); document.body.appendChild(bg); state._modal = bg;
    $("#rs-file").addEventListener("change", (e) => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader(); r.onload = () => { $("#rs-code").value = r.result; }; r.readAsText(f);
    });
  }
  function parseBackup(text) {
    text = (text || "").trim(); if (!text) return null;
    try { const o = JSON.parse(text); if (o && Array.isArray(o.products)) return o; } catch (e) {}
    try { const o = JSON.parse(utf8FromB64url(text)); if (o && Array.isArray(o.products)) return o; } catch (e) {}
    return null;
  }
  function doRestore() {
    const data = parseBackup($("#rs-code").value);
    if (!data) { toast("Nie rozpoznano kopii — sprawdź kod/plik"); return; }
    if (!confirm("Zastąpić obecną bazę wczytaną kopią? Obecne dane na tym urządzeniu zostaną nadpisane.")) return;
    state.products = data.products;
    state.deleted = Array.isArray(data.deleted) ? data.deleted : [];
    mergeNewDefaults(); // bezpiecznik: dołóż aktualne domyślne produkty/kategorie (np. „Kasze i ryż"),
                        // gdyby kopia była starsza — bez kasowania tego, co w kopii
    save(); closeModal(); state.editMode = false; state.search = ""; render(); toast("Wczytano kopię ✓");
  }

  // ---------- Escapowanie ----------
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  // ---------- Tryb udostępnionej listy (odbiorca) ----------
  // Gdy adres zawiera #l=... , pokazujemy listę przysłaną przez inną osobę.
  // Odbiorca może ją odhaczać — jego odhaczenia zapisują się w JEGO telefonie
  // (osobno, nie ruszają jego własnej apki).
  let sharedItems = null;
  function enterSharedModeIfNeeded() {
    const m = location.hash.match(/[#&]l=([^&]+)/);
    if (!m) return false;
    let payload;
    try { payload = JSON.parse(utf8FromB64url(m[1])); } catch (e) { return false; }
    const key = "moje-zakupy-shared:" + hashCode(m[1]);
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(key)) || {}; } catch (e) {}
    sharedItems = payload.i.map(([name, qty, unit, cat]) => ({ name, qty, unit, cat, done: !!saved[name] }));
    document.querySelector(".tabbar").style.display = "none";
    document.querySelector("header h1").textContent = "📩 " + (payload.t || "Udostępniona lista");
    window._sharedKey = key;
    renderShared();
    return true;
  }
  function saveShared() {
    const d = {}; sharedItems.forEach(it => { if (it.done) d[it.name] = 1; });
    localStorage.setItem(window._sharedKey, JSON.stringify(d));
  }
  function sharedToggle(idx) { sharedItems[idx].done = !sharedItems[idx].done; saveShared(); renderShared(); }
  function importShared() {
    load(); // wczytaj własną bazę odbiorcy
    for (const it of sharedItems) {
      let p = state.products.find(x => x.name === it.name);
      if (!p) { addProduct(it.name, it.cat, it.unit); p = state.products.find(x => x.name === it.name); }
      if (p) p.qty = it.qty;
    }
    save();
    location.href = location.pathname; // przeładuj do własnej apki (lista będzie gotowa)
  }
  function renderShared() {
    const done = sharedItems.filter(i => i.done).length, total = sharedItems.length;
    const pct = total ? Math.round(done / total * 100) : 0;
    const y = window.scrollY;
    $("#sub").textContent = "Możesz odhaczać produkty w sklepie";
    const cats = [...new Set(sharedItems.map(i => i.cat || "Inne"))];
    let html = `<main>
      <div class="progress"><span style="width:${pct}%"></span></div>
      <div class="hint">Kupione ${done} z ${total} • dotknij kwadrat, gdy wrzucisz do koszyka</div>`;
    for (const cat of cats) {
      const its = sharedItems.map((it, idx) => ({ it, idx })).filter(o => (o.it.cat || "Inne") === cat);
      html += `<div class="cat-title">${escapeHtml(cat)}</div><div class="card">`;
      for (const { it, idx } of its) {
        html += `<div class="list-item ${it.done ? "done" : ""}">
          <div class="check" onclick="sharedToggle(${idx})">${it.done ? "✓" : ""}</div>
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="qtybadge">${it.qty}${it.unit ? " " + escapeHtml(it.unit) : ""}</div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `<div class="bar" style="margin-top:16px">
        <button class="btn btn-ghost" onclick="importShared()">➕ Dodaj do mojej apki</button>
        <button class="btn btn-primary" onclick="location.href=location.pathname">🛒 Moja apka</button>
      </div>
      <div class="hint" style="text-align:center;margin-top:4px">
        To lista od innej osoby. Twoje odhaczenia zapisują się w Twoim telefonie.
      </div></main>`;
    $("#view").innerHTML = html;
    window.scrollTo(0, y);
  }

  // ---------- Start ----------
  if (!enterSharedModeIfNeeded()) { load(); render(); }
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
  </script>
</body>
</html>
